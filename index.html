<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>BaySync · Almacén</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#0f0f1a;color:#fff;display:flex;flex-direction:column;
  user-select:none;-webkit-user-select:none;touch-action:manipulation
}

/* header */
.header{background:#1a1a2e;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.header .brand{font-size:17px;font-weight:700;white-space:nowrap;text-align:center}
.header .brand span{color:#00e676}
.logo-hdr{height:28px;opacity:.7;flex-shrink:0}
.logo-hdr.intergamma{height:26px}

.subheader{background:#1a1a2e;padding:4px 14px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-top:1px solid #252540}
.subheader .lang{display:flex;gap:3px}
.lang-btn{background:0;border:1px solid #333;color:#666;padding:3px 8px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;transition:.1s}
.lang-btn.active{background:#00e676;color:#111;border-color:#00e676}

.conn-status{display:flex;align-items:center;gap:4px;font-size:11px;color:#888;white-space:nowrap}
.status-dot{display:inline-block;width:9px;height:9px;border-radius:50%}
.status-dot.online{background:#00e676;box-shadow:0 0 6px #00e676}
.status-dot.offline{background:#ff5252}
.status-dot.syncing{background:#ffd740;animation:pulse .8s infinite}
@keyframes pulse{50%{opacity:.4}}

/* grid */
.grid-wrap{flex:1;overflow-y:auto;padding:8px;display:flex;align-items:center;justify-content:center}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:450px}

.door{
  position:relative;border-radius:12px;padding:14px 8px;text-align:center;
  cursor:pointer;transition:transform .1s,box-shadow .1s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:88px;border:2px solid transparent;background:#1e1e36
}
.door:active{transform:scale(.95)}
.door .num{font-size:28px;font-weight:800;line-height:1.1}
.door .label{font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-top:3px;font-weight:600}

.door.libre{border-color:#00e676;background:#1a2e1a}
.door.libre .num,.door.libre .label{color:#69f0ae}
.door.ocupado{border-color:#ff1744;background:#2e1a1a}
.door.ocupado .num,.door.ocupado .label{color:#ff5252}
.door.parcial{border-color:#ffd740;background:#2e2a1a}
.door.parcial .num,.door.parcial .label{color:#ffd740}

.door .badge{position:absolute;top:-5px;right:-5px;font-size:8px;padding:1px 6px;border-radius:12px;background:#ffd740;color:#111;display:none}
.door.dirty .badge{display:block}

/* bottom */
.bottom{flex-shrink:0;padding:8px 12px 4px;background:#1a1a2e}
.btn-send{width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:700;letter-spacing:1px;background:#00e676;color:#111;cursor:pointer;transition:opacity .12s}
.btn-send:active{opacity:.7}
.btn-send:disabled{opacity:.25;cursor:default}
.btn-send .sub{display:block;font-size:10px;font-weight:400;opacity:.7;margin-top:1px}

/* footer */
.footer{flex-shrink:0;padding:8px 14px 10px;background:#0a0a14;display:flex;align-items:center;justify-content:center;border-top:1px solid #1a1a2e}
.footer .credits{font-size:11px;color:#666;font-weight:500;letter-spacing:.3px;white-space:nowrap}

/* request banner */
.request-banner{display:none;background:#ffd740;color:#111;padding:10px 14px;text-align:center;font-weight:600;font-size:13px;flex-shrink:0;animation:flashBg .6s ease-in-out 3}
@keyframes flashBg{50%{background:#ff9100}}
.request-banner.show{display:block}

.offline-bar{display:none;background:#ff1744;color:#fff;padding:5px;text-align:center;font-size:11px;font-weight:600;flex-shrink:0}
.offline-bar.show{display:block}

@media(max-width:380px){
  .door{min-height:72px;padding:10px 6px}
  .door .num{font-size:24px}
  .btn-send{font-size:14px;padding:12px}
  .footer .credits{font-size:10px}
  .logo-hdr{height:22px}
  .logo-hdr.intergamma{height:20px}

}
</style>
</head>
<body>

<div class="header">
  <img class="logo-hdr intergamma" src="intergamma-logo.svg" alt="Intergamma">
  <div class="brand">🚛 <span>BaySync</span></div>
  <img class="logo-hdr dhl" src="dhl-logo.svg" alt="DHL">
</div>
<div class="subheader">
  <div class="lang">
    <button class="lang-btn active" data-lang="es" onclick="setLang('es')">🇪🇸</button>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">🇬🇧</button>
    <button class="lang-btn" data-lang="nl" onclick="setLang('nl')">🇳🇱</button>
  </div>
  <div class="conn-status">
    <span class="status-dot offline" id="statusDot"></span>
    <span id="statusText">---</span>
  </div>
</div>

<div class="request-banner" id="requestBanner">🔔 <span id="reqBannerText">Bo solicita actualización</span></div>
<div class="offline-bar" id="offlineBar">📡 <span id="offlineText">Sin conexión — pendiente de enviar</span></div>

<div class="grid-wrap">
  <div class="grid" id="doorGrid"></div>
</div>

<div class="bottom">
  <button class="btn-send" id="btnSend" disabled>
    <span id="sendBtnLabel">📤 ENVIAR ESTADO</span>
    <span class="sub" id="sendSub"></span>
  </button>
</div>

<div class="footer">
  <span class="credits" id="creditText">Autor: Boris Antequera</span>
</div>

<script>
// ============================================================
//  CONFIG — Base de datos en tiempo real (Firebase REST)
// ============================================================
const DB_URL = 'https://baysync-583a2-default-rtdb.europe-west1.firebasedatabase.app';

// ============================================================
//  I18N
// ============================================================
const LANG = {
  es: {
    libre: '🟢 Libre', ocupado: '🔴 Ocupado', parcial: '🟡 Parcial',
    btnSend: '📤 ENVIAR ESTADO', lastSend: 'Último envío', pendingSend: 'Hay cambios sin enviar',
    noSend: 'Último envío: —', reqBanner: '🔔 Bo solicita actualización — pulsa ENVIAR',
    offline: 'Sin conexión — pendiente de enviar', syncing: 'Enviando...',
    online: 'Conectado', demo: 'Demo (local)', sent: 'Enviado ✅',
    credit: 'Autor: Boris Antequera'
  },
  en: {
    libre: '🟢 Free', ocupado: '🔴 Occupied', parcial: '🟡 Partial',
    btnSend: '📤 SEND STATUS', lastSend: 'Last sent', pendingSend: 'Unsaved changes',
    noSend: 'Last sent: —', reqBanner: '🔔 Bo requests update — press SEND',
    offline: 'Offline — pending to send', syncing: 'Sending...',
    online: 'Connected', demo: 'Demo (local)', sent: 'Sent ✅',
    credit: 'Author: Boris Antequera'
  },
  nl: {
    libre: '🟢 Vrij', ocupado: '🔴 Bezet', parcial: '🟡 Gedeeltelijk',
    btnSend: '📤 VERSTUUR STATUS', lastSend: 'Laatste verzending', pendingSend: 'Niet-opgeslagen wijzigingen',
    noSend: 'Laatste verzending: —', reqBanner: '🔔 Bo vraagt update — druk op VERSTUUR',
    offline: 'Geen verbinding — wacht op verzenden', syncing: 'Verzenden...',
    online: 'Verbonden', demo: 'Demo (lokaal)', sent: 'Verzonden ✅',
    credit: 'Auteur: Boris Antequera'
  }
};
let currentLang = 'es';

// ============================================================
//  STATE
// ============================================================
const DOORS = [18,19,20,21,22,23,24,25,26];
const STORAGE_KEY = 'baysync_doors';
let doorsState = {};
let dirty = false;
let lastSent = null;
let localRequest = false;

function loadState() {
  try { const s = localStorage.getItem(STORAGE_KEY); doorsState = s ? JSON.parse(s) : initDoors(); }
  catch(e){ initDoors(); }
  saveState();
}
function initDoors(){ const o={}; DOORS.forEach(d=>{o[d]='libre'}); return o; }
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(doorsState)); }

// ============================================================
//  LANG
// ============================================================
function setLang(l) {
  currentLang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
  updateUI(); renderGrid();
}
function t(key) { return LANG[currentLang][key] || key; }

// ============================================================
//  UI
// ============================================================
function renderGrid() {
  const grid = document.getElementById('doorGrid');
  grid.innerHTML = '';
  DOORS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'door ' + (doorsState[d]||'libre');
    el.dataset.door = d;
    const st = doorsState[d]||'libre';
    el.innerHTML = `<span class="badge">✏️</span><div class="num">${d}</div><div class="label">${t(st)}</div>`;
    el.addEventListener('click', ()=>toggleDoor(d));
    grid.appendChild(el);
  });
  updateDirtyMarkers();
}

function toggleDoor(d) {
  const cur = doorsState[d]||'libre';
  doorsState[d] = cur==='libre'?'ocupado':cur==='ocupado'?'parcial':'libre';
  saveState(); dirty = true; updateUI(); renderGrid();
}

function updateUI() {
  const btn = document.getElementById('btnSend');
  btn.disabled = !dirty;
  document.getElementById('sendBtnLabel').textContent = t('btnSend');
  const sub = document.getElementById('sendSub');
  if (lastSent) sub.textContent = t('lastSend')+': '+lastSent + (dirty?' · '+t('pendingSend'):'');
  else sub.textContent = dirty ? t('pendingSend') : t('noSend');
  updateDirtyMarkers();
}
function updateDirtyMarkers(){ document.querySelectorAll('.door').forEach(el=>el.classList.toggle('dirty',dirty)); }
function setStatus(mode, txt){ document.getElementById('statusDot').className='status-dot '+mode; document.getElementById('statusText').textContent=txt; }

// ============================================================
//  SEND
// ============================================================
async function sendState() {
  setStatus('syncing', t('syncing'));
  const payload = { doors:{...doorsState}, sentAt:Date.now() };
  if (navigator.onLine) {
    try {
      await fetch(DB_URL + '/muelles.json', { method: 'PUT', body: JSON.stringify(payload) });
      await fetch(DB_URL + '/pedido.json', { method: 'PUT', body: JSON.stringify({activo:false,timestamp:0}) });
    } catch(e) {
      localStorage.setItem(STORAGE_KEY+'_shared', JSON.stringify(payload));
      broadcastState(payload);
    }
  } else {
    localStorage.setItem(STORAGE_KEY+'_shared', JSON.stringify(payload));
    broadcastState(payload);
  }
  localRequest = false; clearRequestBanner();
  dirty = false; lastSent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  saveState(); updateUI(); setStatus('online', t('sent'));
}
let bc=null; try{bc=new BroadcastChannel('baysync')}catch(e){}
function broadcastState(p){ if(bc) bc.postMessage({type:'doors',data:p}); }

// ============================================================
//  ALERTAS — Se activan cuando Bo solicita desde BALIE
// ============================================================
//    1. 🔊 Sonido (Web Audio API) — 3 pitidos + 1 largo
//    2. 📳 Vibración (Vibration API) — patrón de alerta
//    3. 🟧 Banner visual — siempre visible
// ============================================================

// --- Audio Context (compartido, se reanuda con interacción) ---
let audioCtx = null;

function initAudioOnInteraction() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch(e) {}
}

function playAlert() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    // 3 pitidos agudos (880Hz) con intervalos — suena como alerta de camión
    [0, 0.3, 0.6].forEach(t => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'square';       // Sonido más agresivo y perceptible
      osc.frequency.value = 880; // Nota: La5
      gain.gain.setValueAtTime(0.35, audioCtx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + t + 0.22);
      osc.start(audioCtx.currentTime + t);
      osc.stop(audioCtx.currentTime + t + 0.25);
    });

    // Pitido largo final de 500ms para que no pase desapercibido
    setTimeout(() => {
      try {
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.connect(gain2);
        gain2.connect(audioCtx.destination);
        osc2.type = 'square';
        osc2.frequency.value = 660;
        gain2.gain.setValueAtTime(0.25, audioCtx.currentTime);
        gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        osc2.start(audioCtx.currentTime);
        osc2.stop(audioCtx.currentTime + 0.55);
      } catch(e) {}
    }, 1200);
  } catch(e) { console.warn('Audio alert falló:', e); }
}

// --- Vibración ---
function vibrate() {
  try {
    if (navigator.vibrate) {
      // Patrón: pulso largo, pausa, tres pulsos cortos, pausa, pulso largo
      navigator.vibrate([400, 150, 200, 100, 200, 100, 200, 150, 500]);
    }
  } catch(e) {}
}

// --- Alarma completa (se llama automáticamente desde Firebase) ---
function onRequestDetected() {
  if (localRequest) return;
  localRequest = true;

  // 1. Banner visual (SIEMPRE funciona)
  showRequestBanner();

  // 2. Sonido (intento, puede fallar en algunos navegadores)
  playAlert();

  // 3. Vibración (solo Android)
  vibrate();
}

function showRequestBanner() {
  document.getElementById('requestBanner').classList.add('show');
}

function clearRequestBanner() {
  document.getElementById('requestBanner').classList.remove('show');
  localRequest = false;
}

// Inicializar audio en el primer toque del usuario
function onFirstInteraction() {
  initAudioOnInteraction();
}
document.addEventListener('click', onFirstInteraction, { once: true });
document.addEventListener('touchstart', onFirstInteraction, { once: true });

// ============================================================
//  SINCRONIZACIÓN EN TIEMPO REAL (Firebase REST API)
// ============================================================
let localSource = null;

function updateLastSent(v){ if(v&&v.sentAt) lastSent=new Date(v.sentAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }

function initSync() {
  // Escuchar cambios de estado (cuando BALIE envía actualización)
  listenForUpdates();

  // Escuchar solicitudes de Bo (pedido.activo === true)
  listenForRequests();

  // Si hay cambios locales sin enviar, enviar cada 30s
  setInterval(()=>{ if(dirty) sendState(); }, 30000);

  // Escuchar BroadcastChannel como fallback local
  if(bc) bc.onmessage=e=>{
    if(e.data.type==='request') onRequestDetected();
    if(e.data.type==='doors'&&e.data.data&&e.data.data.doors&&!dirty){
      doorsState=e.data.data.doors; saveState(); renderGrid(); updateLastSent(e.data.data); updateUI();
    }
  };
  setStatus('online', 'Conectado');
}

function listenForUpdates() {
  // EventSource escucha cambios en /muelles.json vía SSE
  try {
    localSource = new EventSource(DB_URL + '/muelles.json');
    localSource.onmessage = (e) => {
      try {
        const v = JSON.parse(e.data);
        if (v && v.doors && !dirty) {
          doorsState = v.doors; saveState(); renderGrid(); updateLastSent(v); updateUI();
        }
      } catch(ex) {}
    };
    localSource.onerror = () => {
      // Reintentar conexión después de 3s
      setTimeout(() => { localSource && localSource.close(); listenForUpdates(); }, 3000);
    };
  } catch(e) {}
}

function listenForRequests() {
  // Polling cada 2s para detectar solicitud activa
  let lastReqActive = false;
  setInterval(async () => {
    try {
      const resp = await fetch(DB_URL + '/pedido.json');
      const r = await resp.json();
      if (r && r.activo === true) {
        if (!lastReqActive) onRequestDetected();
        lastReqActive = true;
      } else {
        lastReqActive = false;
      }
    } catch(e) {}
  }, 2000);
}

// ============================================================
//  INIT
// ============================================================
loadState(); renderGrid(); updateUI();
document.getElementById('btnSend').addEventListener('click',sendState);
document.getElementById('reqBannerText').textContent = LANG[currentLang].reqBanner;
document.getElementById('offlineText').textContent = LANG[currentLang].offline;

initSync();

window.addEventListener('online',()=>{document.getElementById('offlineBar').classList.remove('show');setStatus('online','Conectado');});
window.addEventListener('offline',()=>{document.getElementById('offlineBar').classList.add('show');setStatus('offline','Sin conexión');});
if(!navigator.onLine) document.getElementById('offlineBar').classList.add('show');
</script>
</body>
</html>
